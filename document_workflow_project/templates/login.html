<!DOCTYPE html>
<html>

<head>
<title>AI Document Workflow System - Login</title>

<style>

body{
font-family:Arial, sans-serif;
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#007bff,#6a11cb);
}

/* Login Card */

.login-box{
background:white;
padding:40px;
border-radius:12px;
width:350px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
text-align:center;
}

h1{
position:absolute;
top:40px;
color:white;
font-size:28px;
}

.login-box h2{
margin-bottom:25px;
color:#333;
}

/* Inputs */

input{
width:90%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
outline:none;
}

input:focus{
border-color:#007bff;
}

/* Button */

button{
width:95%;
padding:12px;
margin-top:20px;
border:none;
border-radius:8px;
background:#007bff;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#0056b3;
transform:scale(1.03);
}

</style>

</head>

<body>

<h1>AI Document Workflow System</h1>

<div class="login-box">

<h2>Login</h2>

<form action="/dashboard" method="get">

<input type="text" name="username" placeholder="Enter Username" required>

<input type="password" name="password" placeholder="Enter Password" required>

<button type="submit">Login</button>

</form>

</div>

</body>

</html>
