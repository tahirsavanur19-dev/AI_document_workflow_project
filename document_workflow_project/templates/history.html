<!DOCTYPE html>
<html>

<head>

<title>Scan History</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
text-align:center;
}

/* Navbar */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
background:#222;
color:white;
padding:15px 40px;
}

.nav-buttons a{
text-decoration:none;
margin-left:10px;
}

.nav-buttons button{
padding:10px 20px;
border:none;
border-radius:6px;
background:#007bff;
color:white;
cursor:pointer;
}

/* Back Button */

.back-container{
text-align:left;
padding:15px 40px;
}

.back-btn{
padding:8px 18px;
background:#444;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-size:14px;
}

.back-btn:hover{
background:black;
}

/* Heading */

h2{
margin-top:10px;
}

/* Table */

table{
width:90%;
margin:40px auto;
border-collapse:collapse;
background:white;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

th{
background:#007bff;
color:white;
padding:12px;
}

td{
padding:10px;
border-bottom:1px solid #ddd;
}

tr:hover{
background:#f1f1f1;
}

</style>

</head>

<body>

<!-- Navbar -->

<div class="navbar">

<h2>AI Workflow System</h2>

<div class="nav-buttons">

<a href="/upload"><button>Upload</button></a>

<a href="/history"><button>History</button></a>

<a href="/analytics"><button>Analytics</button></a>

<a href="/logout"><button style="background:red;">Logout</button></a>

</div>

</div>

<!-- Back Button -->

<div class="back-container">
<button class="back-btn" onclick="history.back()">⬅ Back</button>
</div>

<h2>Scan History</h2>

<table>

<tr>
<th>ID</th>
<th>Extracted Text</th>
<th>Risk Level</th>
<th>Score</th>
<th>ML Prediction</th>
<th>Confidence</th>
</tr>

{% for scan in scans %}

<tr>

<td>{{scan.id}}</td>
<td>{{scan.extracted_text}}</td>
<td>{{scan.risk_level}}</td>
<td>{{scan.risk_score}}</td>
<td>{{scan.ml_prediction}}</td>
<td>{{scan.ml_confidence}}</td>

</tr>

{% endfor %}

</table>

</body>

</html>
