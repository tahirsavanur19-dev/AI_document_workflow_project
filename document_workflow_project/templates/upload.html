<!DOCTYPE html>
<html>

<head>

<title>Upload Document</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
text-align:center;
margin:0;
}

/* Navbar */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
background:#222;
color:white;
padding:15px 40px;
}

.nav-buttons a{
text-decoration:none;
margin-left:10px;
}

.nav-buttons button{
padding:10px 20px;
border:none;
border-radius:6px;
background:#007bff;
color:white;
cursor:pointer;
}

/* Back Button */

.back-container{
text-align:left;
padding:15px 40px;
}

.back-btn{
padding:8px 18px;
background:#444;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-size:14px;
}

.back-btn:hover{
background:black;
}

/* Page heading */

h1{
margin-top:10px;
}

/* Upload box */

.upload-box{
width:400px;
margin:40px auto;
padding:40px;
border:3px dashed #999;
border-radius:10px;
background:white;
cursor:pointer;
transition:0.3s;
}

.upload-box:hover{
border-color:#007bff;
}

.upload-box.dragover{
border-color:#007bff;
background:#eef5ff;
}

.upload-box p{
font-size:18px;
color:#555;
}

.btn{
margin-top:20px;
padding:12px 25px;
font-size:16px;
border:none;
border-radius:8px;
background:#007bff;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<!-- Navbar -->

<div class="navbar">

<h2>AI Workflow System</h2>

<div class="nav-buttons">

<a href="/upload"><button>Upload</button></a>

<a href="/history"><button>History</button></a>

<a href="/analytics"><button>Analytics</button></a>

<a href="/logout"><button style="background:red;">Logout</button></a>

</div>

</div>

<!-- Back Button -->

<div class="back-container">
<button class="back-btn" onclick="history.back()">⬅ Back</button>
</div>

<h1>Upload Document</h1>

<form action="/upload" method="post" enctype="multipart/form-data">

<div class="upload-box"
onclick="document.getElementById('fileInput').click()"
ondrop="dropHandler(event)"
ondragover="dragOverHandler(event)"
ondragleave="dragLeaveHandler(event)">

<p>Drag & Drop Document Here</p>
<p>OR</p>
<p>Click to Select File</p>

<input type="file" name="file" id="fileInput" hidden onchange="showFileName()">

</div>

<p id="file-name" style="margin-top:15px;color:#555;"></p>

<button class="btn">Upload Document</button>

</form>

<script>

function dragOverHandler(ev){
ev.preventDefault();
document.querySelector(".upload-box").classList.add("dragover");
}

function dragLeaveHandler(ev){
document.querySelector(".upload-box").classList.remove("dragover");
}

function dropHandler(ev){

ev.preventDefault();

const fileInput = document.getElementById("fileInput");
const fileName = document.getElementById("file-name");

document.querySelector(".upload-box").classList.remove("dragover");

fileInput.files = ev.dataTransfer.files;

if(fileInput.files.length > 0){
fileName.innerText = "Selected File: " + fileInput.files[0].name;
}

}

function showFileName(){

const fileInput = document.getElementById("fileInput");
const fileName = document.getElementById("file-name");

if(fileInput.files.length > 0){
fileName.innerText = "Selected File: " + fileInput.files[0].name;
}

}

</script>

</body>

</html>
