<!DOCTYPE html>
<html>

<head>
<title>AI Document Workflow System</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
text-align:center;
margin:0;
}

/* Navbar */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
background:#222;
color:white;
padding:15px 40px;
}

.nav-buttons a{
text-decoration:none;
margin-left:10px;
}

.nav-buttons button{
padding:10px 20px;
border:none;
border-radius:6px;
background:#007bff;
color:white;
cursor:pointer;
}

/* Back Button */

.back-container{
text-align:left;
padding:15px 40px;
}

.back-btn{
padding:8px 18px;
background:#444;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-size:14px;
}

.back-btn:hover{
background:black;
}

/* Heading */

h1{
margin-top:10px;
}

/* Cards */

.cards{
display:flex;
justify-content:center;
gap:40px;
margin-top:50px;
}

.card{
background:white;
padding:25px;
border-radius:10px;
width:200px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card h3{
margin:0;
color:#333;
}

.card p{
font-size:28px;
font-weight:bold;
margin-top:10px;
}

</style>

</head>

<body>

<!-- Navbar -->

<div class="navbar">

<h2>AI Workflow System</h2>

<div class="nav-buttons">

<a href="/upload"><button>Upload</button></a>

<a href="/history"><button>History</button></a>

<a href="/analytics"><button>Analytics</button></a>

<a href="/logout"><button style="background:red;">Logout</button></a>

</div>

</div>

<!-- Back Button -->

<div class="back-container">
<button class="back-btn" onclick="history.back()">⬅ Back</button>
</div>

<h1>AI Document Workflow System</h1>

<!-- Summary Cards -->

<div class="cards">

<div class="card">
<h3>Fraud</h3>
<p style="color:red;">{{ fraud_count }}</p>
</div>

<div class="card">
<h3>Suspicious</h3>
<p style="color:orange;">{{ suspicious_count }}</p>
</div>

<div class="card">
<h3>Safe</h3>
<p style="color:green;">{{ safe_count }}</p>
</div>

</div>

</body>

</html>
